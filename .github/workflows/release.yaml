name: Publish to crates.io

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build binaries for (e.g. v1.0.2)"
        required: true

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    environment:
      name: crates-io
      url: https://crates.io/crates/postgres-lsp

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Run tests
        run: cargo test --workspace

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "Tag v$TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Get crates.io token via trusted publishing
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish postgres-lsp-parse
        run: cargo publish -p postgres-lsp-parse
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish postgres-lsp-format
        run: cargo publish -p postgres-lsp-format
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io to index parse and format
        run: sleep 30

      - name: Publish postgres-lsp-analysis
        run: cargo publish -p postgres-lsp-analysis
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io to index analysis
        run: sleep 30

      - name: Publish postgres-lsp-schema
        run: cargo publish -p postgres-lsp-schema
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io to index schema
        run: sleep 30

      - name: Publish postgres-lsp
        run: cargo publish -p postgres-lsp
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} -p postgres-lsp

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }} -p postgres-lsp

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../postgres-lsp-${{ matrix.target }}.tar.gz postgres-lsp
          cd ../../..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: postgres-lsp-${{ matrix.target }}.tar.gz

  update-homebrew:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        id: checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            url="https://github.com/gmr/postgres-lsp/releases/download/${TAG}/postgres-lsp-${target}.tar.gz"
            curl -fsSL -o "postgres-lsp-${target}.tar.gz" "$url"
            sha=$(sha256sum "postgres-lsp-${target}.tar.gz" | cut -d' ' -f1)
            key=$(echo "${target}" | tr '-' '_')
            echo "${key}=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew tap
        uses: actions/checkout@v5
        with:
          repository: gmr/homebrew-postgres
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_AARCH64_APPLE: ${{ steps.checksums.outputs.aarch64_apple_darwin }}
          SHA_X86_64_APPLE: ${{ steps.checksums.outputs.x86_64_apple_darwin }}
          SHA_AARCH64_LINUX: ${{ steps.checksums.outputs.aarch64_unknown_linux_gnu }}
          SHA_X86_64_LINUX: ${{ steps.checksums.outputs.x86_64_unknown_linux_gnu }}
        run: |
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/postgres-lsp.rb
          sed -i "s|download/v[^/]*/|download/v${VERSION}/|g" Formula/postgres-lsp.rb
          sed -i "/aarch64-apple-darwin/{n;s/sha256 \".*\"/sha256 \"${SHA_AARCH64_APPLE}\"/;}" Formula/postgres-lsp.rb
          sed -i "/x86_64-apple-darwin/{n;s/sha256 \".*\"/sha256 \"${SHA_X86_64_APPLE}\"/;}" Formula/postgres-lsp.rb
          sed -i "/aarch64-unknown-linux-gnu/{n;s/sha256 \".*\"/sha256 \"${SHA_AARCH64_LINUX}\"/;}" Formula/postgres-lsp.rb
          sed -i "/x86_64-unknown-linux-gnu/{n;s/sha256 \".*\"/sha256 \"${SHA_X86_64_LINUX}\"/;}" Formula/postgres-lsp.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/postgres-lsp.rb
          git commit -m "Update postgres-lsp to ${{ steps.version.outputs.version }}"
          git push
